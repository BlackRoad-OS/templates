name: Scheduled Repo Sync

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      repo:
        description: 'Specific repo to sync (leave empty for all)'
        required: false
        type: string
      force:
        description: 'Force sync even if up to date'
        required: false
        default: false
        type: boolean

env:
  WORKER_URL: ${{ secrets.WORKER_URL || 'https://blackroad-agent-jobs.workers.dev' }}
  ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}

jobs:
  trigger-sync:
    name: Trigger Repo Sync
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync via worker
        run: |
          if [ -n "${{ github.event.inputs.repo }}" ]; then
            # Sync specific repo
            curl -X POST "${{ env.WORKER_URL }}/webhooks/trigger-sync" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ env.ADMIN_TOKEN }}" \
              -d '{"repo": "${{ github.event.inputs.repo }}", "force": ${{ github.event.inputs.force || false }}}'
          else
            # Sync all repos
            curl -X POST "${{ env.WORKER_URL }}/webhooks/sync-all" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ env.ADMIN_TOKEN }}"
          fi

      - name: Check sync status
        run: |
          sleep 30
          curl -s "${{ env.WORKER_URL }}/admin/repos" \
            -H "Authorization: Bearer ${{ env.ADMIN_TOKEN }}" | jq .

  health-check:
    name: System Health Check
    runs-on: ubuntu-latest
    needs: trigger-sync
    steps:
      - name: Check worker health
        run: |
          HEALTH=$(curl -s "${{ env.WORKER_URL }}/health")
          echo "$HEALTH" | jq .

          STATUS=$(echo "$HEALTH" | jq -r '.overall')
          if [ "$STATUS" = "unhealthy" ]; then
            echo "Worker is unhealthy!"
            exit 1
          fi

      - name: Check for escalations
        run: |
          ESCALATIONS=$(curl -s "${{ env.WORKER_URL }}/health/escalations" \
            -H "Authorization: Bearer ${{ env.ADMIN_TOKEN }}")

          COUNT=$(echo "$ESCALATIONS" | jq '.count')
          if [ "$COUNT" -gt 0 ]; then
            echo "⚠️ Found $COUNT escalations!"
            echo "$ESCALATIONS" | jq '.escalations'
          fi
